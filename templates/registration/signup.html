{% extends "base.html" %}

{% block title %}Registrarse - ABP6{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card">
            <h3 class="text-center mb-4 text-primary fw-bold">Crear Cuenta</h3>
            <p class="text-center text-white mb-4">Únete a la plataforma para gestionar tus proyectos</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-bold">Registrarse</button>
            </form>
            <div class="text-center mt-4">
                <p class="small text-white">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
